<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مصاريف البناء</title>
  <style>
    :root { --bg:#f7f8fa; --card:#ffffff; --text:#1c2430; --muted:#5b6573; --accent:#1f6feb; --line:#e6e9ef; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "SF Arabic", "Segoe UI", Tahoma, Arial, sans-serif;
      line-height: 1.9; font-size: 17px;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 48px 20px 64px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 32px; text-align: center; }
    h1 { font-size: 32px; margin: 0 0 8px; }
    p.lead { color: var(--muted); font-size: 18px; margin: 0 0 28px; }
    nav { display: flex; flex-direction: column; gap: 12px; }
    nav a {
      display: block; text-decoration: none; color: var(--accent);
      background: #eef4ff; border: 1px solid #d6e4ff; border-radius: 12px;
      padding: 16px 18px; font-size: 18px; font-weight: 600;
    }
    nav a:active { background: #e0ecff; }
    footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>مصاريف البناء</h1>
      <p class="lead">صفحات رسمية لتطبيق مصاريف البناء.</p>
      <nav>
        <a href="privacy.html">سياسة الخصوصية</a>
        <a href="support.html">الدعم</a>
        <a href="terms.html">شروط الاستخدام</a>
      </nav>
    </div>
    <footer>© مصاريف البناء</footer>
  </div>
</body>
</html>
